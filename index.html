        function getColor(type) {
            switch (type) {
                case 'Public': return '#377eb8';
                case 'GOI': return '#4daf4a';
                case 'Private(For Profit)': return '#e41a1c';
                case 'Private(Not For Profit)': return '#984ea3';
                default: return '#999999';
            }
        }

        // Configure Marker Cluster
        var markers = L.markerClusterGroup({
            iconCreateFunction: function(cluster) {
                return L.divIcon({ 
                    html: '<div>' + cluster.getChildCount() + '</div>', 
                    className: 'custom-cluster', 
                    iconSize: L.point(40, 40) 
                });
            }
        });

        var geoJsonLayer = L.geoJSON(cancerHospitals, {
            pointToLayer: function (feature, latlng) {
                var hospitalType = feature.properties['Hospital Type'] || '<no data>';
                
                return L.circleMarker(latlng, {
                    radius: 12,        
                    fillColor: getColor(hospitalType),
                    color: "#000",     // BORDER COLOR CHANGED TO BLACK
                    weight: 3,         // THICKNESS REMAINS 3px
                    opacity: 1,
                    fillOpacity: 0.9
                });
            },
            onEachFeature: function (feature, layer) {
                var props = feature.properties;
                
                if (props && props.name) {
                    layer.bindTooltip("<strong>" + props.name + "</strong>");
                }

                if (props) {
                    var popupContent = 
                        "<div style='font-family: Arial; min-width: 150px;'>" +
                        "<h3 style='margin: 0 0 8px 0; color: #000; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>" + props.name + "</h3>" +
                        "<div style='margin-bottom: 4px;'><b>Type:</b> " + (props['Hospital Type'] || "<no data>") + "</div>" +
                        "<div><b>Empanelment:</b> " + (props['Empanelment Type'] || "N/A") + "</div>" +
                        "</div>";
                    layer.bindPopup(popupContent);
                }
            }
        });

        markers.addLayer(geoJsonLayer);
        map.addLayer(markers);

        // Legend
        var legend = L.control({position: 'bottomleft'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            var categories = ['Public', 'GOI', 'Private(For Profit)', 'Private(Not For Profit)', '<no data>'];
            div.innerHTML = '<strong>Hospital Type</strong><br>';
            for (var i = 0; i < categories.length; i++) {
                div.innerHTML += '<i style="background:' + getColor(categories[i]) + '"></i> ' + categories[i] + '<br>';
            }
            return div;
        };
        legend.addTo(map);

    </script>
